name: CI

on:
  pull_request:
  push:
    branches: [main] # set to the repo's default branch

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      - run: go test ./...
