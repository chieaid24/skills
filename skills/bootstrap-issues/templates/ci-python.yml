name: CI

on:
  pull_request:
  push:
    branches: [main] # set to the repo's default branch

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      # Adjust to the project's install: pyproject extras or requirements.txt
      - run: pip install -e ".[dev]" || pip install -r requirements.txt
      - run: pytest
